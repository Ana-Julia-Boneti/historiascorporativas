    <h2>O chefe e o funcionário</h2>
    <p>Dois funcionários e o gerente de uma empresa saem para almoçar e na rua encontram uma antiga lâmpada a óleo. Eles esfregam a lâmpada e de dentro dela sai um gênio.
</p>
<p>O gênio diz: "Eu só posso conceder três desejos, então concederei um a cada um de vocês."
